server:
  port: 8080

extract:
  processed_dir: "data/processed"   # JSON pre-procesados por Python (PDFs con tablas)
  cache_dir: "data/cache"           # JSON cacheados por go-fitz

chunk:
  strategy: "section"               # section | element | sliding
  max_size: 1000                    # máximo de caracteres por chunk
  overlap: 80                       # solo aplica con strategy: sliding
  context_prefix: true              # antepone SectionPath al texto embebible

embed:
  model: "mxbai-embed-large:latest"
  ollama_url: "http://localhost:11434"
  batch_size: 8                     # chunks por request a Ollama
  query_prefix: "search_query: "       
  document_prefix: "search_document: " 

store:
  bm25_path: "data/bm25.gob"          # path del índice BM25
  qdrant_host: "localhost"
  qdrant_port: 6334                 # puerto gRPC de Qdrant
  collection_name: "rag_docs"
  vector_dimension: 1024             # mxbai-embed-large produce vectores de 1024
  bbolt_path: "data/embeddings.db"

llm:
  model: "qwen2.5:3b"
  ollama_url: "http://localhost:11434"
  max_chunk_length: 700
  options:
    temperature: 0.1
    num_predict: 256
    num_ctx: 2048

search:
  rrf_k: 60
  top_k: 7           
  candidates_k: 40   # cuántos candidatos por store antes de RRF (subir de 20 a 40)
  bm25_k1: 1.2
  bm25_b: 0.75
  max_chunks_per_section: 3  # máximo 2 chunks por sección en el contexto final
  max_dense_per_section: 2  


log:
  file_path: "logs/http.log"
  log_requests: true
  log_responses: true
  max_body_bytes: 100000